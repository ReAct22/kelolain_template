<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kelolain – Masuk</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    :root {
      --green-dark:  #0d4a35;
      --green-main:  #1a6644;
      --green-mid:   #1f7a52;
      --green-light: #d4ede3;
      --green-pale:  #eef7f3;
      --text-dark:   #0f1f18;
      --text-muted:  #6b8a7a;
      --white:       #ffffff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ── LEFT PANEL ── */
    .left-panel {
      width: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--white);
      padding: 48px;
    }

    .form-wrapper {
      width: 100%;
      max-width: 420px;
    }

    .brand-name {
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--green-main);
      margin-bottom: 28px;
    }

    .form-wrapper h1 {
      font-size: 1.95rem;
      font-weight: 800;
      color: var(--text-dark);
      margin-bottom: 32px;
    }

    /* Labels */
    .field-label {
      font-size: .83rem;
      font-weight: 600;
      color: var(--text-dark);
      margin-bottom: 8px;
    }

    /* Input group */
    .input-group-custom {
      position: relative;
      margin-bottom: 20px;
    }
    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #a0b8af;
      font-size: 1rem;
      pointer-events: none;
      z-index: 2;
    }
    .form-input {
      width: 100%;
      padding: 13px 44px 13px 42px;
      border: 1.5px solid #d6e6de;
      border-radius: 10px;
      font-size: .9rem;
      font-family: inherit;
      color: var(--text-dark);
      background: var(--white);
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .form-input::placeholder { color: #b0c9be; }
    .form-input:focus {
      border-color: var(--green-mid);
      box-shadow: 0 0 0 3px rgba(31,122,82,.1);
    }
    .toggle-pw {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #a0b8af;
      font-size: 1rem;
      cursor: pointer;
      padding: 0;
      line-height: 1;
      transition: color .18s;
      z-index: 2;
    }
    .toggle-pw:hover { color: var(--green-mid); }

    /* Remember / Forgot */
    .extras-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }
    .remember-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: .83rem;
      color: var(--text-dark);
      font-weight: 500;
      cursor: pointer;
      user-select: none;
    }
    .remember-label input[type="checkbox"] {
      width: 16px; height: 16px;
      accent-color: var(--green-main);
      cursor: pointer;
    }
    .forgot-link {
      font-size: .83rem;
      font-weight: 700;
      color: var(--green-main);
      text-decoration: none;
      transition: color .18s;
    }
    .forgot-link:hover { color: var(--green-mid); }

    /* Submit button */
    .btn-masuk {
      width: 100%;
      background: var(--green-main);
      color: var(--white);
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-size: 1rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background .2s, transform .15s, box-shadow .2s;
      box-shadow: 0 4px 18px rgba(26,102,68,.25);
      margin-bottom: 24px;
    }
    .btn-masuk:hover {
      background: var(--green-mid);
      transform: translateY(-1px);
      box-shadow: 0 8px 28px rgba(26,102,68,.30);
    }
    .btn-masuk i { font-size: 1rem; }

    /* Register link */
    .register-text {
      text-align: center;
      font-size: .85rem;
      color: var(--text-muted);
    }
    .register-text a {
      color: var(--green-main);
      font-weight: 700;
      text-decoration: none;
      transition: color .18s;
    }
    .register-text a:hover { color: var(--green-mid); }

    /* ── RIGHT PANEL ── */
    .right-panel {
      width: 50%;
      background: var(--green-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px;
      position: relative;
      overflow: hidden;
    }

    /* Decorative circles */
    .right-panel::before {
      content: '';
      position: absolute;
      top: -100px; right: -100px;
      width: 320px; height: 320px;
      border-radius: 50%;
      background: rgba(255,255,255,.05);
      pointer-events: none;
    }
    .right-panel::after {
      content: '';
      position: absolute;
      bottom: -80px; left: -80px;
      width: 260px; height: 260px;
      border-radius: 50%;
      background: rgba(255,255,255,.04);
      pointer-events: none;
    }

    /* Laptop image card */
    .mockup-card {
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 20px;
      overflow: hidden;
      width: 100%;
      max-width: 480px;
      margin-bottom: 36px;
      position: relative;
      z-index: 1;
    }
    .mockup-img {
      width: 100%;
      display: block;
      /* Placeholder gradient to mimic laptop screenshot */
      aspect-ratio: 16/10;
      background: linear-gradient(135deg, #0b3526 0%, #1a6644 40%, #0f4a32 70%, #062b1c 100%);
      position: relative;
      overflow: hidden;
    }
    /* Simulated dashboard UI inside the mockup */
    .mock-screen {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: flex-end;
      padding: 14px;
    }
    .mock-bars {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      width: 100%;
    }
    .mock-bar {
      flex: 1;
      border-radius: 4px 4px 0 0;
      opacity: .55;
    }
    .mock-line {
      position: absolute;
      top: 30%;
      left: 10%; right: 10%;
      height: 2px;
      background: rgba(46,204,143,.6);
      border-radius: 2px;
    }
    .mock-line::before {
      content: '';
      position: absolute;
      top: -1px; left: 40%;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(46,204,143,.9);
      transform: translateY(-3px);
    }
    .mock-dots {
      position: absolute;
      top: 12px; left: 12px; right: 12px;
      display: flex; gap: 6px;
    }
    .mock-dot {
      height: 8px; border-radius: 4px;
      background: rgba(255,255,255,.2);
    }

    /* Laptop frame overlay */
    .laptop-frame {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to bottom, rgba(0,0,0,.3) 0%, transparent 15%, transparent 85%, rgba(0,0,0,.4) 100%);
      pointer-events: none;
    }

    /* Right panel text */
    .right-text { position: relative; z-index: 1; text-align: center; }
    .right-text h2 {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--white);
      margin-bottom: 12px;
      line-height: 1.3;
    }
    .right-text p {
      font-size: .9rem;
      color: rgba(255,255,255,.75);
      line-height: 1.65;
      max-width: 380px;
      margin: 0 auto;
    }

    /* Responsive */
    @media (max-width: 768px) {
      body { flex-direction: column; overflow: auto; height: auto; }
      .left-panel, .right-panel { width: 100%; padding: 40px 28px; }
      .right-panel { min-height: 420px; }
    }
  </style>
</head>
<body>

  <!-- ══════════════ LEFT PANEL ══════════════ -->
  <div class="left-panel">
    <div class="form-wrapper">

      <div class="brand-name">Kelolain</div>
      <h1>Selamat Datang</h1>

      <!-- Email -->
      <div class="field-label">Email atau Username</div>
      <div class="input-group-custom">
        <i class="bi bi-person input-icon"></i>
        <input type="email" class="form-input" placeholder="user@gmail.com" id="emailInput"/>
      </div>

      <!-- Password -->
      <div class="field-label">Password</div>
      <div class="input-group-custom">
        <i class="bi bi-lock input-icon"></i>
        <input type="password" class="form-input" placeholder="••••••••" id="passwordInput" value="password123"/>
        <button class="toggle-pw" id="togglePw" type="button">
          <i class="bi bi-eye" id="eyeIcon"></i>
        </button>
      </div>

      <!-- Ingat saya + Lupa password -->
      <div class="extras-row">
        <label class="remember-label">
          <input type="checkbox" id="rememberMe"/>
          Ingat saya
        </label>
        <a href="#" class="forgot-link">Lupa Password?</a>
      </div>

      <!-- Submit -->
      <button class="btn-masuk" type="button" onclick="window.location.href='kelolain-dashboard.html'">
        Masuk <i class="bi bi-arrow-right"></i>
      </button>

      <!-- Register -->
      <p class="register-text">
        Belum punya akun? <a href="#">Daftar sekarang</a>
      </p>

    </div>
  </div>

  <!-- ══════════════ RIGHT PANEL ══════════════ -->
  <div class="right-panel">

    <!-- Mockup card -->
    <div class="mockup-card">
      <div class="mockup-img">
        <!-- Simulated screen content -->
        <div class="mock-dots">
          <div class="mock-dot" style="width:60px;"></div>
          <div class="mock-dot" style="width:40px;"></div>
          <div class="mock-dot" style="width:50px;"></div>
          <div class="mock-dot" style="width:35px;"></div>
        </div>
        <div class="mock-line"></div>
        <div class="mock-screen">
          <div class="mock-bars">
            <div class="mock-bar" style="height:35%;background:#2ecc8f;"></div>
            <div class="mock-bar" style="height:55%;background:#2ecc8f;"></div>
            <div class="mock-bar" style="height:42%;background:#1a6644;"></div>
            <div class="mock-bar" style="height:68%;background:#2ecc8f;"></div>
            <div class="mock-bar" style="height:50%;background:#1a6644;"></div>
            <div class="mock-bar" style="height:80%;background:#2ecc8f;"></div>
            <div class="mock-bar" style="height:62%;background:#1a6644;"></div>
            <div class="mock-bar" style="height:45%;background:#2ecc8f;"></div>
            <div class="mock-bar" style="height:70%;background:#2ecc8f;"></div>
            <div class="mock-bar" style="height:55%;background:#1a6644;"></div>
            <div class="mock-bar" style="height:38%;background:#2ecc8f;"></div>
            <div class="mock-bar" style="height:60%;background:#1a6644;"></div>
          </div>
        </div>
        <div class="laptop-frame"></div>
      </div>
    </div>

    <!-- Text -->
    <div class="right-text">
      <h2>Visualisasikan Pertumbuhan Bisnis Anda</h2>
      <p>Dari manajemen transaksi harian hingga laporan keuangan komprehensif, semuanya dalam satu dasbor terpadu.</p>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Toggle password visibility
    const togglePw   = document.getElementById('togglePw');
    const pwInput    = document.getElementById('passwordInput');
    const eyeIcon    = document.getElementById('eyeIcon');

    togglePw.addEventListener('click', () => {
      const isHidden = pwInput.type === 'password';
      pwInput.type   = isHidden ? 'text' : 'password';
      eyeIcon.className = isHidden ? 'bi bi-eye-slash' : 'bi bi-eye';
    });
  </script>

</body>
</html>
