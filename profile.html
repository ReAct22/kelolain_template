<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kelolain – Profile</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    :root {
      --green-dark:  #0d4a35;
      --green-main:  #1a6644;
      --green-mid:   #1f7a52;
      --green-light: #d4ede3;
      --green-pale:  #eef7f3;
      --text-dark:   #0f1f18;
      --text-muted:  #6b8a7a;
      --border:      #e2ece7;
      --bg:          #f5f7f6;
      --sidebar-w:   230px;
      --white:       #ffffff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg); color: var(--text-dark);
      display: flex; height: 100vh; overflow: hidden;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-w); min-width: var(--sidebar-w);
      background: var(--white); border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      padding: 28px 16px 20px;
      height: 100vh; position: fixed; left: 0; top: 0; z-index: 100;
    }
    .sidebar-brand { margin-bottom: 36px; padding: 0 8px; }
    .sidebar-brand h2 { font-size: 1.2rem; font-weight: 800; color: var(--green-dark); line-height: 1.1; }
    .sidebar-brand span { font-size: .68rem; font-weight: 600; color: var(--text-muted); }
    .nav-menu { flex: 1; display: flex; flex-direction: column; gap: 3px; }
    .nav-item {
      display: flex; align-items: center; gap: 11px;
      padding: 10px 14px; border-radius: 10px;
      font-size: .88rem; font-weight: 600; color: var(--text-muted);
      cursor: pointer; text-decoration: none; transition: background .18s, color .18s;
    }
    .nav-item i { font-size: 1rem; }
    .nav-item:hover { background: var(--green-pale); color: var(--green-dark); }
    .nav-item.active { background: var(--green-pale); color: var(--green-dark); }
    .nav-divider { height: 1px; background: var(--border); margin: 10px 8px; }
    .upgrade-card {
      background: var(--green-pale); border: 1px solid var(--green-light);
      border-radius: 14px; padding: 14px 16px;
    }
    .upgrade-label { font-size: .62rem; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 5px; }
    .upgrade-card h6 { font-size: .84rem; font-weight: 800; color: var(--green-dark); margin-bottom: 11px; line-height: 1.4; }
    .btn-upgrade { width: 100%; background: var(--green-dark); color: var(--white); border: none; border-radius: 8px; padding: 8px; font-size: .8rem; font-weight: 700; cursor: pointer; transition: background .2s; }
    .btn-upgrade:hover { background: var(--green-mid); }
    .nav-bottom { display: flex; flex-direction: column; gap: 3px; }

    /* ── MAIN ── */
    .main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    /* Topbar */
    .topbar {
      background: var(--white); border-bottom: 1px solid var(--border);
      padding: 12px 28px; display: flex; align-items: center; justify-content: flex-end; gap: 14px;
    }
    .topbar-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 1.05rem; cursor: pointer; transition: background .18s; }
    .topbar-icon:hover { background: var(--green-pale); }
    .topbar-divider { width: 1px; height: 28px; background: #dde8e3; }
    .user-info { text-align: right; }
    .user-info .name { font-size: .85rem; font-weight: 700; }
    .user-info .role { font-size: .7rem; color: var(--text-muted); }
    .avatar-top { width: 36px; height: 36px; border-radius: 50%; background: var(--green-light); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: .78rem; color: var(--green-dark); overflow: hidden; }
    .avatar-top img { width: 100%; height: 100%; object-fit: cover; }

    /* Content */
    .content { flex: 1; overflow-y: auto; padding: 32px 28px 40px; }
    .content::-webkit-scrollbar { width: 5px; }
    .content::-webkit-scrollbar-thumb { background: #ccddd5; border-radius: 10px; }

    /* Page header */
    .page-header { margin-bottom: 28px; }
    .page-header h1 { font-size: 1.65rem; font-weight: 800; }
    .page-header p  { font-size: .87rem; color: var(--text-muted); margin-top: 4px; }

    /* ── PROFILE LAYOUT ── */
    .profile-layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 0;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      max-width: 860px;
    }
    @media (max-width: 700px) { .profile-layout { grid-template-columns: 1fr; } }

    /* ── LEFT: Avatar panel ── */
    .avatar-panel {
      background: var(--white);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      align-items: center;
      padding: 40px 24px 32px;
      gap: 0;
    }

    /* Avatar circle */
    .avatar-wrap {
      position: relative;
      width: 120px; height: 120px;
      margin-bottom: 18px;
    }
    .avatar-circle {
      width: 120px; height: 120px; border-radius: 50%;
      border: 2.5px solid var(--green-light);
      background: var(--green-pale);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      font-size: 2rem; font-weight: 800; color: var(--green-main);
    }
    .avatar-circle img { width: 100%; height: 100%; object-fit: cover; display: none; }
    .avatar-circle .initials { line-height: 1; }

    /* Camera button */
    .cam-btn {
      position: absolute; bottom: 4px; right: 4px;
      width: 34px; height: 34px; border-radius: 50%;
      background: var(--green-main); color: var(--white);
      border: 3px solid var(--white);
      display: flex; align-items: center; justify-content: center;
      font-size: .85rem; cursor: pointer;
      transition: background .18s, transform .18s;
      box-shadow: 0 2px 8px rgba(13,74,53,.25);
    }
    .cam-btn:hover { background: var(--green-mid); transform: scale(1.08); }
    #avatarFileInput { display: none; }

    /* Name + role */
    .profile-name { font-size: 1.05rem; font-weight: 800; color: var(--text-dark); margin-bottom: 4px; text-align: center; }
    .profile-role { font-size: .8rem; color: var(--text-muted); text-align: center; margin-bottom: 18px; }

    /* Badges */
    .badge-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
    .badge-verified {
      border: 1.5px solid var(--green-mid); color: var(--green-main);
      background: transparent; border-radius: 20px;
      font-size: .72rem; font-weight: 700; padding: 4px 14px;
    }
    .badge-premium {
      border: 1.5px solid var(--text-dark); color: var(--text-dark);
      background: transparent; border-radius: 20px;
      font-size: .72rem; font-weight: 700; padding: 4px 14px;
    }

    /* ── RIGHT: Form panel ── */
    .form-panel {
      display: flex; flex-direction: column;
    }

    .form-body { padding: 32px 32px 24px; flex: 1; }

    .fields-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    @media (max-width: 560px) { .fields-grid { grid-template-columns: 1fr; } }

    .field-group { }
    .field-label {
      display: block; font-size: .8rem; font-weight: 700;
      color: var(--text-dark); margin-bottom: 8px;
    }
    .field-input {
      width: 100%; border: 1.5px solid var(--border); border-radius: 10px;
      padding: 11px 14px; font-size: .87rem; font-family: inherit;
      color: var(--text-dark); background: var(--white); outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .field-input:focus {
      border-color: var(--green-mid);
      box-shadow: 0 0 0 3px rgba(31,122,82,.08);
    }
    .field-input::placeholder { color: #c8d8d0; }
    .field-input.is-invalid { border-color: #e53935; box-shadow: 0 0 0 3px rgba(229,57,53,.08); }
    .field-full { grid-column: 1 / -1; }

    /* Form footer */
    .form-footer {
      border-top: 1px solid var(--border);
      padding: 18px 32px;
      display: flex; justify-content: flex-end; gap: 12px;
      background: var(--bg);
    }
    .btn-cancel {
      border: 1.5px solid var(--border); background: var(--white);
      border-radius: 10px; padding: 11px 28px;
      font-size: .88rem; font-weight: 700; color: var(--green-main);
      cursor: pointer; transition: background .2s, border-color .2s; font-family: inherit;
    }
    .btn-cancel:hover { background: var(--green-pale); border-color: var(--green-mid); }
    .btn-save {
      background: var(--green-dark); color: var(--white);
      border: none; border-radius: 10px; padding: 11px 28px;
      font-size: .88rem; font-weight: 700; cursor: pointer;
      transition: background .2s, transform .15s; font-family: inherit;
      display: flex; align-items: center; gap: 8px;
    }
    .btn-save:hover { background: var(--green-mid); transform: translateY(-1px); }

    /* ── TOAST ── */
    .toast-wrap {
      position: fixed; bottom: 28px; right: 28px; z-index: 9999;
      display: none;
    }
    .toast-box {
      background: var(--green-dark); color: var(--white);
      border-radius: 12px; padding: 14px 20px;
      display: flex; align-items: center; gap: 12px;
      box-shadow: 0 8px 30px rgba(13,74,53,.25);
      font-size: .88rem; font-weight: 600; min-width: 240px;
    }
    .toast-box i { font-size: 1.1rem; color: #2ecc8f; }
  </style>
</head>
<body>

<!-- ══════════════ SIDEBAR ══════════════ -->
<aside class="sidebar">
  <div class="sidebar-brand">
    <h2>Kelolain</h2>
    <span>Business Management</span>
  </div>
  <nav class="nav-menu">
    <a href="kelolain-dashboard.html"   class="nav-item"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a>
    <a href="kelolain-laporan.html"     class="nav-item"><i class="bi bi-bar-chart-line-fill"></i> Laporan</a>
    <a href="kelolain-transaksi.html"   class="nav-item"><i class="bi bi-receipt"></i> Riwayat Transaksi</a>
    <a href="kelolain-produk.html"      class="nav-item"><i class="bi bi-box-seam-fill"></i> Produk</a>
    <a href="#"                         class="nav-item active"><i class="bi bi-person-circle"></i> Profile</a>
  </nav>
  <div style="flex:1;"></div>
  <div class="upgrade-card">
    <div class="upgrade-label">Tingkatkan Bisnis</div>
    <h6>Paket Enterprise kini tersedia!</h6>
    <button class="btn-upgrade">Upgrade Plan</button>
  </div>
  <div class="nav-divider"></div>
  <div class="nav-bottom">
    <a href="#" class="nav-item"><i class="bi bi-gear"></i> Settings</a>
    <a href="kelolain-login.html" class="nav-item" style="color:#c0392b;"><i class="bi bi-box-arrow-right"></i> Logout</a>
  </div>
</aside>

<!-- ══════════════ MAIN ══════════════ -->
<div class="main">

  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-icon"><i class="bi bi-bell"></i></div>
    <div class="topbar-icon"><i class="bi bi-gear"></i></div>
    <div class="topbar-divider"></div>
    <div class="user-info">
      <div class="name">Josep Abduloh</div>
      <div class="role">Penjual</div>
    </div>
    <div class="avatar-top" id="topbarAvatar">JA</div>
  </div>

  <!-- Content -->
  <div class="content">

    <!-- Page Header -->
    <div class="page-header">
      <h1>Profile</h1>
      <p>Profil anda</p>
    </div>

    <!-- ── PROFILE CARD ── -->
    <div class="profile-layout">

      <!-- Left: Avatar -->
      <div class="avatar-panel">
        <div class="avatar-wrap">
          <div class="avatar-circle" id="avatarCircle">
            <img id="avatarImg" src="" alt="avatar"/>
            <span class="initials" id="avatarInitials">JA</span>
          </div>
          <button class="cam-btn" onclick="document.getElementById('avatarFileInput').click()" title="Ganti foto">
            <i class="bi bi-camera-fill"></i>
          </button>
          <input type="file" id="avatarFileInput" accept="image/*"/>
        </div>

        <div class="profile-name" id="displayName">Josep Abduloh</div>
        <div class="profile-role" id="displayRole">Owner Warung makmur</div>

        <div class="badge-row">
          <span class="badge-verified">Verified</span>
          <span class="badge-premium">Premium</span>
        </div>
      </div>

      <!-- Right: Form -->
      <div class="form-panel">
        <div class="form-body">
          <div class="fields-grid">

            <!-- Full Name -->
            <div class="field-group">
              <label class="field-label">Full Name</label>
              <input type="text" class="field-input" id="fullName" value="Josep Abduloh" placeholder="Masukkan nama lengkap"/>
            </div>

            <!-- Email -->
            <div class="field-group">
              <label class="field-label">Email Anda</label>
              <input type="email" class="field-input" id="emailUser" value="josep@warungmakmur.id" placeholder="contoh@email.com"/>
            </div>

            <!-- Nomor Telepon -->
            <div class="field-group">
              <label class="field-label">Nomor Telepon</label>
              <input type="tel" class="field-input" id="noTelp" value="+62 812-3456-7890" placeholder="+62 ..."/>
            </div>

            <!-- Nama Bisnis -->
            <div class="field-group">
              <label class="field-label">Nama Bisnis</label>
              <input type="text" class="field-input" id="namaBisnis" value="Warung Makmur" placeholder="Nama bisnis Anda"/>
            </div>

            <!-- Tanggal Lahir (full width) -->
            <div class="field-group field-full">
              <label class="field-label">Tanggal Lahir</label>
              <input type="date" class="field-input" id="tglLahir" value="1995-06-15"/>
            </div>

          </div>
        </div>

        <!-- Footer actions -->
        <div class="form-footer">
          <button class="btn-cancel" onclick="cancelEdit()">Cancel</button>
          <button class="btn-save"   onclick="saveProfile()">
            <i class="bi bi-check-lg"></i> Save Perubahan
          </button>
        </div>
      </div>

    </div><!-- /profile-layout -->

  </div><!-- /content -->
</div><!-- /main -->

<!-- Toast -->
<div class="toast-wrap" id="toastWrap">
  <div class="toast-box">
    <i class="bi bi-check-circle-fill"></i>
    Profil berhasil diperbarui!
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // ── Avatar upload ──
  const avatarFileInput = document.getElementById('avatarFileInput');
  const avatarImg       = document.getElementById('avatarImg');
  const avatarInitials  = document.getElementById('avatarInitials');
  const topbarAvatar    = document.getElementById('topbarAvatar');

  avatarFileInput.addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      avatarImg.src = ev.target.result;
      avatarImg.style.display = 'block';
      avatarInitials.style.display = 'none';
      // update topbar avatar too
      topbarAvatar.innerHTML = `<img src="${ev.target.result}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"/>`;
    };
    reader.readAsDataURL(file);
  });

  // ── Live name preview ──
  document.getElementById('fullName').addEventListener('input', function() {
    const val = this.value.trim();
    document.getElementById('displayName').textContent = val || 'Nama Anda';
    // Update initials
    const parts = val.split(' ').filter(Boolean);
    const ini = parts.length >= 2
      ? (parts[0][0] + parts[parts.length-1][0]).toUpperCase()
      : (val.slice(0,2).toUpperCase());
    avatarInitials.textContent = ini || 'JA';
  });

  document.getElementById('namaBisnis').addEventListener('input', function() {
    const val = this.value.trim();
    document.getElementById('displayRole').textContent = val ? 'Owner ' + val : 'Owner';
  });

  // ── Cancel ──
  const originalValues = {};
  document.querySelectorAll('.field-input').forEach(el => {
    originalValues[el.id] = el.value;
  });

  function cancelEdit() {
    document.querySelectorAll('.field-input').forEach(el => {
      el.value = originalValues[el.id] || '';
      el.classList.remove('is-invalid');
    });
    document.getElementById('displayName').textContent = 'Josep Abduloh';
    document.getElementById('displayRole').textContent = 'Owner Warung Makmur';
    avatarInitials.textContent = 'JA';
    avatarImg.style.display = 'none';
    avatarInitials.style.display = '';
    topbarAvatar.textContent = 'JA';
  }

  // ── Save ──
  function saveProfile() {
    let valid = true;
    ['fullName','emailUser','noTelp','namaBisnis'].forEach(id => {
      const el = document.getElementById(id);
      if (!el.value.trim()) {
        el.classList.add('is-invalid');
        valid = false;
      } else {
        el.classList.remove('is-invalid');
      }
    });
    if (!valid) return;

    // Update stored values
    document.querySelectorAll('.field-input').forEach(el => {
      originalValues[el.id] = el.value;
    });

    // Show toast
    const toast = document.getElementById('toastWrap');
    toast.style.display = 'block';
    setTimeout(() => { toast.style.display = 'none'; }, 2000);
  }

  // Remove invalid on input
  document.querySelectorAll('.field-input').forEach(el => {
    el.addEventListener('input', () => el.classList.remove('is-invalid'));
  });
</script>
</body>
</html>
