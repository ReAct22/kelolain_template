<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kelolain – Daftar</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    :root {
      --green-dark:  #0d4a35;
      --green-main:  #1a6644;
      --green-mid:   #1f7a52;
      --green-light: #d4ede3;
      --green-pale:  #eef7f3;
      --text-dark:   #0f1f18;
      --text-muted:  #8a9e96;
      --border:      #dce8e2;
      --bg:          #f0f3f5;
      --white:       #ffffff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px 32px;
    }

    /* ── HEADER ── */
    .page-header {
      text-align: center;
      margin-bottom: 28px;
    }
    .page-header h1 {
      font-size: 1.75rem;
      font-weight: 800;
      color: var(--text-dark);
      margin-bottom: 6px;
    }
    .page-header p {
      font-size: .9rem;
      color: var(--text-muted);
    }

    /* ── CARD ── */
    .register-card {
      background: var(--white);
      border-radius: 18px;
      border: 1px solid #e2ece7;
      padding: 36px 40px 32px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 4px 28px rgba(13,74,53,.06);
    }

    .card-title {
      font-size: 1.35rem;
      font-weight: 800;
      color: var(--text-dark);
      margin-bottom: 6px;
    }
    .card-sub {
      font-size: .83rem;
      color: var(--text-muted);
      margin-bottom: 28px;
      line-height: 1.5;
    }

    /* ── FIELDS ── */
    .field-group {
      margin-bottom: 18px;
    }
    .field-label {
      display: block;
      font-size: .8rem;
      font-weight: 600;
      color: var(--text-dark);
      margin-bottom: 7px;
    }
    .input-wrap {
      position: relative;
    }
    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #b0c4bc;
      font-size: .95rem;
      pointer-events: none;
      z-index: 1;
    }
    .field-input {
      width: 100%;
      padding: 12px 14px 12px 40px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: .87rem;
      font-family: inherit;
      color: var(--text-dark);
      background: var(--white);
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .field-input::placeholder { color: #c0d0ca; }
    .field-input:focus {
      border-color: var(--green-mid);
      box-shadow: 0 0 0 3px rgba(31,122,82,.09);
    }
    .field-input.is-invalid {
      border-color: #e53935;
      box-shadow: 0 0 0 3px rgba(229,57,53,.09);
    }
    .toggle-pw {
      position: absolute;
      right: 13px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #b0c4bc;
      font-size: .95rem;
      cursor: pointer;
      padding: 0;
      line-height: 1;
      transition: color .18s;
    }
    .toggle-pw:hover { color: var(--green-mid); }

    /* Password strength bar */
    .pw-strength {
      margin-top: 7px;
      display: none;
    }
    .pw-strength-bar {
      height: 4px;
      border-radius: 4px;
      background: #e4ede9;
      overflow: hidden;
      margin-bottom: 4px;
    }
    .pw-strength-fill {
      height: 100%;
      border-radius: 4px;
      width: 0%;
      transition: width .3s, background .3s;
    }
    .pw-strength-text {
      font-size: .7rem;
      font-weight: 600;
      color: var(--text-muted);
    }

    /* ── SUBMIT BTN ── */
    .btn-daftar {
      width: 100%;
      background: var(--green-main);
      color: var(--white);
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-size: .95rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      margin-top: 24px;
      margin-bottom: 20px;
      transition: background .2s, transform .15s, box-shadow .2s;
      box-shadow: 0 4px 18px rgba(26,102,68,.22);
    }
    .btn-daftar:hover {
      background: var(--green-mid);
      transform: translateY(-1px);
      box-shadow: 0 8px 26px rgba(26,102,68,.28);
    }

    /* Divider */
    .card-divider {
      border: none;
      border-top: 1px solid #eaefec;
      margin: 0 0 18px;
    }

    /* Login link */
    .login-text {
      text-align: center;
      font-size: .85rem;
      color: var(--text-muted);
    }
    .login-text a {
      color: var(--green-main);
      font-weight: 700;
      text-decoration: none;
      transition: color .18s;
    }
    .login-text a:hover { color: var(--green-mid); }

    /* ── FOOTER ── */
    .page-footer {
      margin-top: 28px;
      font-size: .78rem;
      color: #aabbb3;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .register-card { padding: 28px 22px 24px; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="page-header">
    <h1>Kelolain</h1>
    <p>Solusi manajemen bisnis profesional.</p>
  </div>

  <!-- Register Card -->
  <div class="register-card">
    <div class="card-title">Buat Akun Baru</div>
    <div class="card-sub">Lengkapi data di bawah untuk memulai pengelolaan bisnis Anda.</div>

    <!-- Nama Lengkap -->
    <div class="field-group">
      <label class="field-label">Nama Lengkap</label>
      <div class="input-wrap">
        <i class="bi bi-person input-icon"></i>
        <input type="text" class="field-input" placeholder="Masukkan nama lengkap" id="namaInput"/>
      </div>
    </div>

    <!-- Nomer HP -->
    <div class="field-group">
      <label class="field-label">Nomer HP</label>
      <div class="input-wrap">
        <i class="bi bi-telephone input-icon"></i>
        <input type="tel" class="field-input" placeholder="Masukkan Nomer Hp" id="hpInput"/>
      </div>
    </div>

    <!-- Username -->
    <div class="field-group">
      <label class="field-label">Username</label>
      <div class="input-wrap">
        <i class="bi bi-at input-icon"></i>
        <input type="text" class="field-input" placeholder="Masukkan username" id="usernameInput"/>
      </div>
    </div>

    <!-- Nama Bisnis -->
    <div class="field-group">
      <label class="field-label">Nama Bisnis</label>
      <div class="input-wrap">
        <i class="bi bi-shop input-icon"></i>
        <input type="text" class="field-input" placeholder="Masukkan nama bisnis Anda" id="bisnisInput"/>
      </div>
    </div>

    <!-- Email -->
    <div class="field-group">
      <label class="field-label">Email</label>
      <div class="input-wrap">
        <i class="bi bi-envelope input-icon"></i>
        <input type="email" class="field-input" placeholder="contoh@gmail.com" id="emailInput"/>
      </div>
    </div>

    <!-- Kata Sandi -->
    <div class="field-group">
      <label class="field-label">Kata Sandi</label>
      <div class="input-wrap">
        <i class="bi bi-lock input-icon"></i>
        <input type="password" class="field-input" placeholder="Min. 8 karakter" id="passwordInput"/>
        <button class="toggle-pw" type="button" id="togglePw1">
          <i class="bi bi-eye" id="eyeIcon1"></i>
        </button>
      </div>
      <!-- Password strength -->
      <div class="pw-strength" id="pwStrength">
        <div class="pw-strength-bar">
          <div class="pw-strength-fill" id="pwFill"></div>
        </div>
        <span class="pw-strength-text" id="pwText">Terlalu pendek</span>
      </div>
    </div>

    <!-- Konfirmasi Kata Sandi -->
    <div class="field-group">
      <label class="field-label">Konfirmasi Kata Sandi</label>
      <div class="input-wrap">
        <i class="bi bi-shield-lock input-icon"></i>
        <input type="password" class="field-input" placeholder="Ulangi kata sandi" id="confirmInput"/>
        <button class="toggle-pw" type="button" id="togglePw2">
          <i class="bi bi-eye" id="eyeIcon2"></i>
        </button>
      </div>
    </div>

    <!-- Submit -->
    <button class="btn-daftar" type="button" id="btnDaftar">
      Daftar <i class="bi bi-arrow-right"></i>
    </button>

    <hr class="card-divider"/>

    <p class="login-text">
      Sudah punya akun? <a href="kelolain-login.html">Masuk</a>
    </p>
  </div>

  <!-- Footer -->
  <div class="page-footer">© 2026 Kelolain Suite</div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Toggle password 1
    document.getElementById('togglePw1').addEventListener('click', () => {
      const inp  = document.getElementById('passwordInput');
      const icon = document.getElementById('eyeIcon1');
      const show = inp.type === 'password';
      inp.type       = show ? 'text' : 'password';
      icon.className = show ? 'bi bi-eye-slash' : 'bi bi-eye';
    });

    // Toggle password 2
    document.getElementById('togglePw2').addEventListener('click', () => {
      const inp  = document.getElementById('confirmInput');
      const icon = document.getElementById('eyeIcon2');
      const show = inp.type === 'password';
      inp.type       = show ? 'text' : 'password';
      icon.className = show ? 'bi bi-eye-slash' : 'bi bi-eye';
    });

    // Password strength meter
    const pwInput   = document.getElementById('passwordInput');
    const pwStrength = document.getElementById('pwStrength');
    const pwFill    = document.getElementById('pwFill');
    const pwText    = document.getElementById('pwText');

    pwInput.addEventListener('input', () => {
      const val = pwInput.value;
      pwStrength.style.display = val.length ? 'block' : 'none';

      let score = 0;
      if (val.length >= 8)  score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;

      const levels = [
        { pct: '25%',  color: '#e53935', label: 'Lemah' },
        { pct: '50%',  color: '#fb8c00', label: 'Cukup' },
        { pct: '75%',  color: '#f9c404', label: 'Baik'  },
        { pct: '100%', color: '#2ecc8f', label: 'Kuat'  },
      ];
      const lv = val.length < 8 ? { pct: '15%', color: '#e53935', label: 'Terlalu pendek' }
                                 : levels[score - 1] || levels[0];
      pwFill.style.width      = lv.pct;
      pwFill.style.background = lv.color;
      pwText.textContent      = lv.label;
      pwText.style.color      = lv.color;
    });

    // Confirm password match
    const confirmInput = document.getElementById('confirmInput');
    confirmInput.addEventListener('input', () => {
      if (confirmInput.value && confirmInput.value !== pwInput.value) {
        confirmInput.classList.add('is-invalid');
      } else {
        confirmInput.classList.remove('is-invalid');
      }
    });

    // Submit
    document.getElementById('btnDaftar').addEventListener('click', () => {
      const fields = ['namaInput','hpInput','usernameInput','bisnisInput','emailInput','passwordInput','confirmInput'];
      let valid = true;

      fields.forEach(id => {
        const el = document.getElementById(id);
        if (!el.value.trim()) {
          el.classList.add('is-invalid');
          valid = false;
        } else {
          el.classList.remove('is-invalid');
        }
      });

      if (confirmInput.value !== pwInput.value) {
        confirmInput.classList.add('is-invalid');
        valid = false;
      }

      if (valid) {
        window.location.href = 'kelolain-dashboard.html';
      }
    });

    // Remove invalid on input
    document.querySelectorAll('.field-input').forEach(el => {
      el.addEventListener('input', () => el.classList.remove('is-invalid'));
    });
  </script>

</body>
</html>
